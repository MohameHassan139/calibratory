name: caliborty
description: Medical Equipment Calibration & Consultation App - UMECC
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2

  # Supabase (file storage only)
  supabase_flutter: ^2.5.6

  # Document handling
  archive: ^3.6.1
  path_provider: ^2.1.4
  open_file: ^3.3.2
  file_picker: ^8.1.2

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0+3
  pinput: ^5.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  share_plus: ^10.1.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  email_validator: ^3.0.0

  # PDF & Excel
  pdf: ^3.11.1
  printing: ^5.13.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/monitor_certificate.docx
